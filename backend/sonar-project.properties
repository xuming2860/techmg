# SonarQube 配置 — techmg backend
sonar.projectKey=techmg-backend
sonar.projectName=techmg-backend
sonar.projectVersion=2.0

# 源码路径
sonar.sources=techmg-admin/src/main/java,techmg-system/src/main/java,techmg-business-service/src/main/java,techmg-framework/src/main/java,techmg-common/src/main/java
sonar.tests=techmg-admin/src/test/java,techmg-system/src/test/java,techmg-business-service/src/test/java,techmg-framework/src/test/java,techmg-common/src/test/java

# Java 配置
sonar.java.binaries=techmg-admin/target/classes,techmg-system/target/classes,techmg-business-service/target/classes,techmg-framework/target/classes,techmg-common/target/classes
sonar.java.libraries=techmg-admin/target/*.jar,techmg-system/target/*.jar,techmg-business-service/target/*.jar,techmg-framework/target/*.jar,techmg-common/target/*.jar
sonar.java.source=17
sonar.sourceEncoding=UTF-8

# 排除
sonar.exclusions=**/target/**,**/node_modules/**

# 覆盖率 (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=**/target/surefire-reports
