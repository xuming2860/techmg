server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:mysql://prod-db:3306/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
          username: techmg
          password: ${DB_PASSWORD}
        slave:
          url: jdbc:mysql://prod-db-slave:3306/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
          username: techmg
          password: ${DB_PASSWORD}

  druid:
    stat-view-servlet:
      enabled: false

logging:
  level:
    com.icbc.sh.techmg: INFO
