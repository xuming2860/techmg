server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  profiles:
    active: dev
  application:
    name: techmg
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure

  # 多数据源配置（dynamic-datasource）
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://47.99.179.180:33066/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: techmg
          password: Tech@123++**
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        slave:
          url: jdbc:mysql://47.99.179.180:33066/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: techmg
          password: Tech@123++**
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource

  # Druid 连接池配置
  druid:
    connection-init-sqls:
      - SET NAMES utf8mb4
    stat-view-servlet:
      enabled: false
    web-stat-filter:
      enabled: true
    filter:
      stat:
        enabled: true
        log-slow-sql: true
        slow-sql-millis: 2000
      wall:
        enabled: true

  # Redis — 待行内 NOS 封装后重新启用
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     password:
  #     database: 0
  #     lettuce:
  #       pool:
  #         max-active: 8
  #         max-idle: 8
  #         min-idle: 0

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.icbc.sh.techmg
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT
jwt:
  secret: techmg-jwt-secret-key-2024-shanghai-icbc-research-base
  expiration: 86400000  # 24h

# API Access Log
api:
  access-log:
    max-length: 4000  # max chars for request/response body logging

# ============================================================
# SSIC 统一认证配置（对接行内 SSIC 平台）
# enablessIc: true=开启统一认证, false=关闭 (使用 mock 登录)
# 部署到内网时只需修改此处的 enabled + sm-public-key + aam 相关配置
# ============================================================
ssic:
  enabled: false
  ip: aam.icbc                              # 统一认证服务器地址
  server-key-name: SsIC                     # 统一认证公钥名称 (SsIC:pub)
  version: SM2                              # 统一认证版本
  client-key-name: techmanageplatform       # 应用的密钥名称
  sm-public-key: ""                         # 3.0非对称密钥 (部署时填写)
  client-site-url: http://localhost:5173/#/ # 应用登录回调 URL
  aam-qry-teller-info-url: ""              # AAM 查询用户信息接口 URL
  aam-dsf-ip: ""                           # AAM DSF IP

# Mock 登录配置（ssic.enabled=false 时生效）
login:
  mock:
    auth-no: "admin"
    teller-name: "管理员"
    branch-id: "12092342"
    branch-name: "上海技术部"
    notes-id: "admin@sdc.com"
    ad-account: ""
    roles:
      - "ROLE_PLATFORM_ADMIN"
