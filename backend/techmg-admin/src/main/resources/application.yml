server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  profiles:
    active: dev
  application:
    name: techmg
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure

  # 多数据源配置（dynamic-datasource）
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://47.99.179.180:33066/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: techmg
          password: Tech@123++**
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
        slave:
          url: jdbc:mysql://47.99.179.180:33066/tmvp?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          username: techmg
          password: Tech@123++**
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource

  # Druid 连接池配置
  druid:
    connection-init-sqls:
      - SET NAMES utf8mb4
    stat-view-servlet:
      enabled: false
    web-stat-filter:
      enabled: true
    filter:
      stat:
        enabled: true
        log-slow-sql: true
        slow-sql-millis: 2000
      wall:
        enabled: true

  # Redis — 待行内 NOS 封装后重新启用
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     password:
  #     database: 0
  #     lettuce:
  #       pool:
  #         max-active: 8
  #         max-idle: 8
  #         min-idle: 0

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.icbc.sh.techmg
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# JWT
jwt:
  secret: techmg-jwt-secret-key-2024-shanghai-icbc-research-base
  expiration: 86400000  # 24h

# API Access Log
api:
  access-log:
    max-length: 4000  # max chars for request/response body logging

# SSO (set enabled: true to activate; false keeps mock login)
sso:
  enabled: false
  login-url: ""
  logout-url: ""

# Mock 登录配置（sso.enabled=false 时生效）
login:
  mock:
    auth-no: "admin"
    real-name: "平台管理员"
    branch-id: "12092342"
    branch-name: "上海技术部"
    notes-id: "admin@sdc.com"
    ad-account: ""
    roles:
      - "ROLE_PLATFORM_ADMIN"
